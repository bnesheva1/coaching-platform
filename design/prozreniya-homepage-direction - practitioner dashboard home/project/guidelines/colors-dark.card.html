<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;font-family:var(--font-ui)}
.row{display:flex;gap:0;padding:20px;background:var(--bg-page)}
.sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:90px;border-radius:8px;margin-right:10px;padding:8px;font:var(--text-caption);color:var(--text-secondary)}
</style></head><body data-theme="dark">
<div class="row">
  <div class="sw" style="background:var(--bg-page);border:1px solid var(--border-subtle)">bg-page</div>
  <div class="sw" style="background:var(--bg-surface);border:1px solid var(--border-subtle)">bg-surface</div>
  <div class="sw" style="background:var(--bg-surface-2)">bg-surface-2</div>
  <div class="sw" style="background:var(--bg-sunken)">bg-sunken</div>
  <div class="sw" style="background:var(--accent);color:var(--text-on-accent)">accent</div>
  <div class="sw" style="background:var(--accent-subtle);color:var(--accent-subtle-text)">accent-subtle</div>
</div>
</body></html>
