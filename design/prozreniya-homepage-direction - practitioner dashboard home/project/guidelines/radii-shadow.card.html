<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;background:var(--bg-page);display:flex;gap:20px;font-family:var(--font-ui)}
.b{width:90px;height:90px;background:var(--bg-surface);border:1px solid var(--border-subtle);display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font:var(--text-caption);color:var(--text-tertiary)}
</style></head><body>
<div class="b" style="border-radius:var(--radius-sm)">sm 6px</div>
<div class="b" style="border-radius:var(--radius-md)">md 10px</div>
<div class="b" style="border-radius:var(--radius-lg)">lg 14px</div>
<div class="b" style="border-radius:var(--radius-xl)">xl 20px</div>
<div class="b" style="border-radius:var(--radius-md);box-shadow:var(--shadow-md);border:none">shadow-md</div>
</body></html>
